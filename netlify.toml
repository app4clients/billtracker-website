# ============================================================
# 🚀 NETLIFY DEPLOYMENT CONFIGURATION
# ============================================================
# This file tells Netlify how to build and deploy your site.
# When you push changes to GitHub, Netlify auto-rebuilds!
# ============================================================

[build]
  # Command to build the site
  command = "npm run build"
  
  # Directory where the built files are output
  publish = "dist"

# Redirect all routes to index.html (for single-page app)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
